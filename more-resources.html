  <body class="background_mox_opal">
    <header>
      <h1>PreFIRE</h1>
    </header>
    <main>


      <section>
        <h2>Scryfall Query</h2>
        <code style="background-color:black;color:white;">       (date>=8ed and date<=rna) (game:paper) (st:core or st:expansion) </code>
      </section>
       
    <section>
        <h2>Sample Decklists</h2>
        <a href="https://docs.google.com/spreadsheets/d/1XdWlFN6867u0tuuu1Vt_EeJPz-FUulDFQnLoVmdphSw/edit?gid=1274498955#gid=1274498955" target="_blank">HandShufflings compiled Google Sheets</a>
      </section>
      
      
      
      <section>
        <h2>Deck Checker</h2>
        <p>Enter your list and check if it's PreFIRE legal!</p>
        <textarea id="validator" spellcheck="false" placeholder="Paste your deck list here&#10;Example:&#10;4 Arcbound Ravager&#10;4 Blinkmoth Nexus&#10;4 Cranial Plating&#10;4 Darksteel Citadel&#10;2 Etched Champion&#10;...more cards...&#10;&#10;Sideboard:&#10;2 Damping Sphere&#10;2 Dispatch&#10;2 Ghirapur Aether Grid&#10;1 Grafdigger's Cage&#10;...more sideboard cards..."></textarea>
        <button id="checkDeckButton" class="ui-green">Check Deck</button>
        <p id="issues"></p>
      </section>
      
      <section>
        <h2>Alternative Decklist Checker</h2>
        <a href="https://badaro.github.io/validator/" target="_blank">Decklist Validator</a>
      </section>
      
    </main>
    <footer></footer>
